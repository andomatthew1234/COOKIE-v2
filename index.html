<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Cookie Madness 🍪</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>

/* ===== RESET ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top, #3a1f0f 0%, #1a0f08 45%, #090504 100%);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===== RESPONSIVE ===== */

@media (max-width: 700px){
    #cookie-container{ transform:scale(0.75); }
    #counter{ font-size:2rem !important; }
    #shop-sidebar{ width:100% !important; }
}

/* ===== COUNTER ===== */

#counter{
    position:absolute;
    top:20px;
    left:20px;
    font-size:3rem;
    font-weight:900;
    text-shadow:0 0 25px rgba(255,180,80,0.4);
}

/* ===== SHOP BUTTON ===== */

#shop-button{
    position:absolute;
    top:20px;
    right:20px;
    padding:12px 16px;
    font-size:1.1rem;
    font-weight:800;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:linear-gradient(135deg,#ffb347,#ff6a2f);
    color:white;
    box-shadow:0 0 25px rgba(255,140,50,0.4);
    display:flex;
    align-items:center;
    gap:10px;
}

#shop-button img{ width:22px; height:22px; }

/* ===== COOKIE ===== */

#cookie-container{
    position:relative;
    width:420px;
    height:420px;
    display:flex;
    align-items:center;
    justify-content:center;
}

#cookie-glow{
    position:absolute;
    width:340px;
    height:340px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,180,80,0.5), transparent 70%);
    filter:blur(30px);
}

#cookie{
    width:320px;
    height:320px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    transition:transform 0.08s ease;
}

#cookie img{
    width:100%;
    height:100%;
    object-fit:contain;
    animation:idleFloat 3s ease-in-out infinite;
}

@keyframes idleFloat{
    0%,100%{ transform:translateY(0px); }
    50%{ transform:translateY(-10px); }
}

/* ===== FX ===== */

.click-number{
    position:absolute;
    font-size:2rem;
    font-weight:900;
    color:#fff3d6;
    animation:floatUp 1s forwards;
    pointer-events:none;
}

@keyframes floatUp{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-120px) scale(1.8);}
}

.spark{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:white;
    animation:sparkBurst 0.7s forwards;
}

@keyframes sparkBurst{
    from{opacity:1;}
    to{opacity:0; transform:translate(var(--x), var(--y)) scale(0);}
}

/* ===== PURCHASE EFFECT ===== */

.purchase-effect{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:3rem;
    font-weight:900;
    color:#fff3d6;
    animation:purchaseFloat 2s forwards;
    pointer-events:none;
}

@keyframes purchaseFloat{
    0%{opacity:1; transform:translate(-50%, -50%) scale(1);}
    100%{opacity:0; transform:translate(-50%, -50%) scale(2);}
}

/* ===== LIBRARY ===== */

.shop-body.library .shop-details{
    display:none;
}

.shop-body.library .shop-items{
    width:100%;
}

.apply-btn{
    margin-left:10px;
    padding:5px 10px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#ffb347,#ff6a2f);
    color:white;
    font-weight:700;
    cursor:pointer;
}

/* ===== SHOP ===== */

#shop-sidebar{
    position:fixed;
    top:0;
    right:0;
    width:420px;
    height:100%;
    background:rgba(20,10,5,0.95);
    backdrop-filter:blur(15px);
    border-left:2px solid rgba(255,140,50,0.2);
    transform:translateX(100%);
    transition:0.3s ease;
    display:flex;
    flex-direction:column;
}

#shop-sidebar.open{
    transform:translateX(0);
}

/* HEADER */

.shop-header{
    padding:18px;
    font-size:1.8rem;
    font-weight:900;
    border-bottom:1px solid rgba(255,255,255,0.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.shop-header-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.shop-header img{
    width:26px;
    height:26px;
}

/* CLOSE */

#close-shop{
    background:none;
    border:none;
    color:white;
    font-size:1.5rem;
    cursor:pointer;
}

/* TABS */

.shop-tabs{
    display:flex;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.shop-tab{
    flex:1;
    padding:10px;
    text-align:center;
    cursor:pointer;
    font-weight:700;
    opacity:0.6;
}

.shop-tab.active{
    opacity:1;
    background:rgba(255,140,50,0.15);
}

/* BODY */

.shop-body{
    display:flex;
    flex:1;
}

/* ITEMS */

.shop-items{
    width:45%;
    border-right:1px solid rgba(255,255,255,0.1);
}

.shop-item{
    padding:15px;
    cursor:pointer;
}

.shop-item:hover{
    background:rgba(255,140,50,0.1);
}

/* DETAILS */

.shop-details{
    flex:1;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:15px;
}

.shop-details img{
    width:160px;
    height:160px;
    object-fit:contain;
}

#buy-btn{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    font-weight:900;
    cursor:pointer;
    background:linear-gradient(135deg,#ffb347,#ff6a2f);
    color:white;
}

#buy-btn:disabled {
    background: grey;
    cursor: not-allowed;
}

</style>
</head>

<body>

<div id="counter">0 Cookies 🍪</div>

<button id="shop-button">
    <img src="items/shop.png">
    Shop
</button>

<div id="cookie-container">
    <div id="cookie-glow"></div>
    <div id="cookie">
        <img id="cookie-img" src="cookie.png">
    </div>
</div>

<!-- SHOP -->
<div id="shop-sidebar">

    <div class="shop-header">

        <div class="shop-header-left">
            <img src="items/shop.png">
            Shop
        </div>

        <button id="close-shop">✖</button>

    </div>

    <div class="shop-tabs">
        <div class="shop-tab active">Shop</div>
        <div class="shop-tab">My Library</div>
    </div>

    <div class="shop-body">

        <div class="shop-items" id="shop-items">
            <div class="shop-item" id="yellow-item">
                Yellow Cookie - 100🍪
            </div>
        </div>

        <div class="shop-details">

            <img id="item-img" src="items/yellow_cookie.png">

            <div id="item-title">YELLOW COOKIE!</div>

            <div id="item-desc">Applies a YELLOW COOKIE to your page forever!</div>

            <button id="buy-btn">Buy (100🍪)</button>

        </div>

    </div>

</div>

<script>

/* ===== STORAGE ===== */

let cookies = Number(localStorage.getItem("cookies")) || 0;
let owned = JSON.parse(localStorage.getItem("owned")) || [];
let currentCookie = localStorage.getItem("currentCookie") || "default";

const cookieImages = {
    default: "cookie.png",
    yellow: "items/yellow_cookie.png"
};

/* SET COOKIE */

function setCookie(id) {
    currentCookie = id;
    cookieImg.src = cookieImages[id];
    localStorage.setItem("currentCookie", currentCookie);
}

/* ELEMENTS */

const counter = document.getElementById("counter");
const cookie = document.getElementById("cookie");
const cookieImg = document.getElementById("cookie-img");
const buyBtn = document.getElementById("buy-btn");

const sidebar = document.getElementById("shop-sidebar");
const shopBtn = document.getElementById("shop-button");
const closeBtn = document.getElementById("close-shop");

/* UPDATE */

function updateUI(){
    counter.innerText = `${cookies} Cookies 🍪`;
    localStorage.setItem("cookies", cookies);
    localStorage.setItem("owned", JSON.stringify(owned));

    // Update buy button state
    if (owned.includes("yellow")) {
        buyBtn.disabled = true;
        buyBtn.innerText = "Owned";
    } else if (cookies >= 100) {
        buyBtn.disabled = false;
        buyBtn.innerText = "Buy (100🍪)";
    } else {
        buyBtn.disabled = true;
        buyBtn.innerText = "You can't afford this item!";
    }
}

/* INIT */

updateUI();
setCookie(currentCookie);

/* COOKIE CLICK */

cookie.onclick = (e)=>{
    cookies++;
    updateUI();

    cookie.animate([
        {transform:"scale(1)"},
        {transform:"scale(0.9)"},
        {transform:"scale(1.1)"},
        {transform:"scale(1)"}
    ],{duration:250});
};

/* BUY */

buyBtn.onclick = ()=>{

    if(cookies >= 100 && !owned.includes("yellow")){

        cookies -= 100;
        owned.push("yellow");

        setCookie("yellow");

        updateUI();

        // Purchase animation
        const effect = document.createElement("div");
        effect.className = "purchase-effect";
        effect.innerText = "PURCHASED!";
        document.getElementById("cookie-container").appendChild(effect);
        setTimeout(() => effect.remove(), 2000);
    }
};

/* LIBRARY APPLY */

function selectItem(){
    if(owned.includes("yellow")){
        setCookie("yellow");
    }
}

document.getElementById("yellow-item").onclick = selectItem;

/* TAB SWITCHING */

const tabs = document.querySelectorAll(".shop-tab");

tabs.forEach(tab => {
    tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        if (tab.innerText === "Shop") {
            showShop();
        } else if (tab.innerText === "My Library") {
            showLibrary();
        }
    });
});

function showShop() {
    const shopItems = document.getElementById("shop-items");
    shopItems.innerHTML = '<div class="shop-item" id="yellow-item">Yellow Cookie - 100🍪</div>';
    document.getElementById("yellow-item").onclick = selectItem;

    document.getElementById("item-img").src = "items/yellow_cookie.png";
    document.getElementById("item-title").innerText = "YELLOW COOKIE!";
    document.getElementById("item-desc").innerText = "Applies a YELLOW COOKIE to your page forever!";

    document.getElementById("shop-sidebar").classList.remove("library");
    buyBtn.style.display = "block";
    updateUI();
}

function showLibrary() {
    const shopItems = document.getElementById("shop-items");
    shopItems.innerHTML = '<div class="shop-item">Default Cookie <button class="apply-btn" onclick="setCookie(\'default\')">Apply</button></div>';
    if (owned.includes("yellow")) {
        shopItems.innerHTML += '<div class="shop-item">Yellow Cookie <button class="apply-btn" onclick="setCookie(\'yellow\')">Apply</button></div>';
    }

    document.getElementById("shop-sidebar").classList.add("library");
    buyBtn.style.display = "none";
}

/* SHOP TOGGLE */

shopBtn.onclick = ()=> sidebar.classList.add("open");
closeBtn.onclick = ()=> sidebar.classList.remove("open");

/* ===== CONSOLE CHEAT FIX ===== */

window.force_cookie_ = function(value){

    value = Number(value);

    if (isNaN(value)) {
        console.log("❌ Not a number");
        return;
    }

    cookies = value;
    updateUI();

    console.log(`🍪 Forced cookies to ${cookies}`);
};

</script>

</body>
</html>
