<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Cookie Madness 🍪</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top, #3a1f0f 0%, #1a0f08 45%, #090504 100%);
    color:white;
}

/* ===== HUD ===== */

#counter{
    position:absolute;
    top:30px;
    left:30px;
    font-size:3.5rem;
    font-weight:900;
    text-shadow:0 0 25px rgba(255,180,80,0.5);
    z-index:10;
}

/* ===== SHOP BUTTON ===== */

#shop-button{
    position:absolute;
    top:30px;
    right:30px;
    padding:14px 22px;
    border:none;
    border-radius:14px;
    font-size:1.2rem;
    font-weight:800;
    cursor:pointer;
    background:linear-gradient(135deg,#ffb347,#ff6a2f);
    color:white;
    box-shadow:0 0 25px rgba(255,140,50,0.4);
    transition:0.2s;
    z-index:20;
}

#shop-button:hover{
    transform:scale(1.05);
}

/* ===== GAME AREA ===== */

body{
    display:flex;
    align-items:center;
    justify-content:center;
}

/* cookie */

#cookie-container{
    position:relative;
    width:420px;
    height:420px;
    display:flex;
    align-items:center;
    justify-content:center;
}

#cookie-glow{
    position:absolute;
    width:340px;
    height:340px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,180,80,0.5), transparent 70%);
    filter:blur(30px);
}

#cookie{
    width:320px;
    height:320px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,0.6));
}

#cookie img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* ===== CLICK FX ===== */

.click-number{
    position:absolute;
    font-size:2rem;
    font-weight:900;
    color:#fff3d6;
    animation:floatUp 1s forwards;
    pointer-events:none;
    text-shadow:0 0 12px orange;
}

@keyframes floatUp{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-120px) scale(1.6);}
}

/* ===== SHOP SIDEBAR ===== */

#shop-sidebar{
    position:fixed;
    top:0;
    right:0;
    width:420px;
    height:100%;
    background:rgba(20,10,5,0.95);
    backdrop-filter:blur(15px);
    border-left:2px solid rgba(255,140,50,0.2);
    transform:translateX(100%);
    transition:0.3s ease;
    display:flex;
    flex-direction:column;
    z-index:100;
}

#shop-sidebar.open{
    transform:translateX(0);
}

/* header */

.shop-header{
    padding:20px;
    font-size:2rem;
    font-weight:900;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* layout */

.shop-body{
    display:flex;
    flex:1;
}

/* item list */

.shop-items{
    width:45%;
    border-right:1px solid rgba(255,255,255,0.1);
    overflow-y:auto;
}

.shop-item{
    padding:15px;
    cursor:pointer;
    transition:0.2s;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.shop-item:hover{
    background:rgba(255,140,50,0.1);
}

.shop-item.active{
    background:rgba(255,140,50,0.25);
}

/* detail panel */

.shop-details{
    flex:1;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:15px;
}

.shop-details img{
    width:160px;
    height:160px;
    object-fit:contain;
    filter:drop-shadow(0 10px 25px rgba(255,150,60,0.4));
}

.shop-title{
    font-size:1.5rem;
    font-weight:900;
}

.shop-desc{
    font-size:0.95rem;
    opacity:0.8;
    line-height:1.4;
}

</style>
</head>

<body>

<div id="counter">0 Cookies 🍪</div>

<button id="shop-button">🛒 Shop</button>

<div id="cookie-container">
    <div id="cookie-glow"></div>
    <div id="cookie">
        <img src="cookie.png">
    </div>
</div>

<!-- SHOP SIDEBAR -->
<div id="shop-sidebar">

    <div class="shop-header">Shop 🛒</div>

    <div class="shop-body">

        <!-- ITEM LIST -->
        <div class="shop-items">

            <div class="shop-item active" onclick="selectItem('yellow')">
                Yellow Cookie
            </div>

        </div>

        <!-- ITEM DETAILS -->
        <div class="shop-details" id="shop-details">

            <img src="C:\Users\muman\OneDrive\Other\Documents\Coding\COOKIE v2\items\yellow_cookie.png" id="item-img">

            <div class="shop-title" id="item-title">
                YELLOW COOKIE!
            </div>

            <div class="shop-desc" id="item-desc">
                Applies a YELLOW COOKIE to your page for unlimited time!
            </div>

        </div>

    </div>
</div>

<script>

let cookies = 0;

const counter = document.getElementById("counter");
const cookie = document.getElementById("cookie");
const shopBtn = document.getElementById("shop-button");
const sidebar = document.getElementById("shop-sidebar");

/* toggle shop */

shopBtn.addEventListener("click", ()=>{
    sidebar.classList.toggle("open");
});

/* click cookie */

cookie.addEventListener("click",(e)=>{

    cookies++;
    counter.innerText = `${cookies} Cookies 🍪`;

    const plus = document.createElement("div");
    plus.className = "click-number";
    plus.innerText = "+1";

    plus.style.left = e.clientX + "px";
    plus.style.top = e.clientY + "px";

    document.body.appendChild(plus);

    setTimeout(()=>plus.remove(),1000);

});

/* shop selection */

function selectItem(type){

    document.querySelectorAll(".shop-item")
        .forEach(el=>el.classList.remove("active"));

    document.querySelector(".shop-item")
        .classList.add("active");

    // placeholder only (no logic yet)
    document.getElementById("item-title").innerText =
        "YELLOW COOKIE!";

    document.getElementById("item-desc").innerText =
        "Applies a YELLOW COOKIE to your page for unlimited time!";

    document.getElementById("item-img").src =
        "C:\Users\muman\OneDrive\Other\Documents\Coding\COOKIE v2\items\yellow_cookie.png";
}

</script>

</body>
</html>
