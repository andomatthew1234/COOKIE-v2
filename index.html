<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Cookie Madness 🍪</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top, #3a1f0f 0%, #1a0f08 45%, #090504 100%);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===== COUNTER ===== */

#counter{
    position:absolute;
    top:25px;
    left:25px;
    font-size:3.5rem;
    font-weight:900;
    text-shadow:
        0 0 10px rgba(255,255,255,0.3),
        0 0 30px rgba(255,180,80,0.4);
    animation:counterPulse 2s infinite ease-in-out;
    z-index:10;
}

@keyframes counterPulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.04); }
}

/* ===== SHOP BUTTON ===== */

#shop-button{
    position:absolute;
    top:25px;
    right:25px;

    padding:12px 18px;
    font-size:1.2rem;
    font-weight:800;

    border:none;
    border-radius:14px;

    cursor:pointer;

    background:linear-gradient(135deg,#ffb347,#ff6a2f);
    color:white;

    box-shadow:0 0 25px rgba(255,140,50,0.4);

    transition:0.2s;

    z-index:20;

    display:flex;
    align-items:center;
    gap:10px;
}

#shop-button:hover{
    transform:scale(1.07);
}

#shop-button img{
    width:22px;
    height:22px;
    object-fit:contain;
}

/* ===== COOKIE AREA ===== */

#cookie-container{
    position:relative;
    width:420px;
    height:420px;
    display:flex;
    align-items:center;
    justify-content:center;
}

#cookie-glow{
    position:absolute;
    width:340px;
    height:340px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,180,80,0.5), transparent 70%);
    filter:blur(30px);
    animation:glowPulse 3s infinite ease-in-out;
}

@keyframes glowPulse{
    0%,100%{ transform:scale(1); opacity:0.8; }
    50%{ transform:scale(1.2); opacity:1; }
}

/* COOKIE */

#cookie{
    width:320px;
    height:320px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    transition:transform 0.08s ease;
}

#cookie:hover{
    transform:scale(1.05) rotate(-2deg);
}

#cookie:active{
    transform:scale(0.92);
}

#cookie img{
    width:100%;
    height:100%;
    object-fit:contain;
    pointer-events:none;
    animation:idleFloat 3s ease-in-out infinite;
}

@keyframes idleFloat{
    0%,100%{ transform:translateY(0px); }
    50%{ transform:translateY(-10px); }
}

/* ===== CLICK FX ===== */

.click-number{
    position:absolute;
    font-size:2rem;
    font-weight:900;
    color:#fff3d6;
    animation:floatUp 1s forwards ease-out;
    pointer-events:none;
    text-shadow:0 0 12px orange;
}

@keyframes floatUp{
    0%{ opacity:1; transform:translateY(0) scale(1); }
    100%{ opacity:0; transform:translateY(-120px) scale(1.8); }
}

.spark{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:white;
    pointer-events:none;
    animation:sparkBurst 0.7s forwards ease-out;
}

@keyframes sparkBurst{
    from{ opacity:1; transform:translate(0,0) scale(1); }
    to{ opacity:0; transform:translate(var(--x), var(--y)) scale(0); }
}

/* ===== SHOP SIDEBAR ===== */

#shop-sidebar{
    position:fixed;
    top:0;
    right:0;
    width:420px;
    height:100%;
    background:rgba(20,10,5,0.95);
    backdrop-filter:blur(15px);
    border-left:2px solid rgba(255,140,50,0.2);
    transform:translateX(100%);
    transition:0.3s ease;
    display:flex;
    flex-direction:column;
    z-index:100;
}

#shop-sidebar.open{
    transform:translateX(0);
}

.shop-header{
    padding:20px;
    font-size:2rem;
    font-weight:900;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.shop-body{
    display:flex;
    flex:1;
}

.shop-items{
    width:45%;
    border-right:1px solid rgba(255,255,255,0.1);
}

.shop-item{
    padding:15px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,0.05);
    transition:0.2s;
}

.shop-item:hover{
    background:rgba(255,140,50,0.1);
}

.shop-item.active{
    background:rgba(255,140,50,0.25);
}

.shop-details{
    flex:1;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:15px;
}

.shop-details img{
    width:160px;
    height:160px;
    object-fit:contain;
    filter:drop-shadow(0 10px 25px rgba(255,150,60,0.4));
}

.shop-title{
    font-size:1.5rem;
    font-weight:900;
}

.shop-desc{
    font-size:0.95rem;
    opacity:0.8;
    line-height:1.4;
}

</style>
</head>

<body>

<div id="counter">0 Cookies 🍪</div>

<button id="shop-button">
    <img src="items/shop.png">
    Shop
</button>

<div id="cookie-container">
    <div id="cookie-glow"></div>
    <div id="cookie">
        <img src="cookie.png">
    </div>
</div>

<!-- SHOP -->
<div id="shop-sidebar">

    <div class="shop-header">Shop 🛒</div>

    <div class="shop-body">

        <div class="shop-items">
            <div class="shop-item active">Yellow Cookie</div>
        </div>

        <div class="shop-details">

            <img src="items/yellow_cookie.png">

            <div class="shop-title">YELLOW COOKIE!</div>

            <div class="shop-desc">
                Applies a YELLOW COOKIE to your page for unlimited time!
            </div>

        </div>

    </div>

</div>

<script>

let cookies = 0;

const counter = document.getElementById("counter");
const cookie = document.getElementById("cookie");
const shopBtn = document.getElementById("shop-button");
const sidebar = document.getElementById("shop-sidebar");

/* SHOP TOGGLE */
shopBtn.addEventListener("click",()=>{
    sidebar.classList.toggle("open");
});

/* COOKIE CLICK */
cookie.addEventListener("click",(e)=>{

    cookies++;
    counter.innerText = `${cookies} Cookies 🍪`;

    cookie.animate([
        { transform:"scale(1)" },
        { transform:"scale(0.9)" },
        { transform:"scale(1.12)" },
        { transform:"scale(1)" }
    ],{ duration:250 });

    counter.animate([
        { transform:"scale(1)" },
        { transform:"scale(1.25)" },
        { transform:"scale(1)" }
    ],{ duration:300 });

    const plus = document.createElement("div");
    plus.className = "click-number";
    plus.innerText = "+1";

    plus.style.left = e.clientX + "px";
    plus.style.top = e.clientY + "px";

    document.body.appendChild(plus);
    setTimeout(()=>plus.remove(),1000);

    for(let i=0;i<18;i++){

        const s = document.createElement("div");
        s.className = "spark";

        s.style.left = e.clientX + "px";
        s.style.top = e.clientY + "px";

        s.style.setProperty("--x",(Math.random()-0.5)*300+"px");
        s.style.setProperty("--y",(Math.random()-0.5)*300+"px");

        document.body.appendChild(s);
        setTimeout(()=>s.remove(),700);
    }

});

</script>

</body>
</html>
